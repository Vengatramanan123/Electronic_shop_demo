<section class="section" id="services">
  <div class="container">
    <p class="badge">What We Fix</p>
    <h2 class="section-title">Our Repair Services</h2>
    <p class="section-subtitle">We handle all kinds of electronic repairs with genuine parts and skilled technicians.</p>

    <div class="services-grid">
      <div class="service-card" *ngFor="let service of services">
        <div class="service-icon">{{ service.icon }}</div>
        <h3>{{ service.title }}</h3>
        <p>{{ service.description }}</p>
        <ul>
          <li *ngFor="let item of service.items">✓ {{ item }}</li>
        </ul>
        <div class="service-price">Starting from <strong>{{ service.price }}</strong></div>
      </div>
    </div>
  </div>
</section>
