<section class="section" id="services">
  <div class="container">
    <p class="badge">Our Services</p>
    <h2 class="section-title">VM WashCare Services</h2>
    <p class="section-subtitle">Professional washing machine repair and maintenance services.</p>

    <div class="services-grid">
      <div class="service-card" *ngFor="let service of services">
        <div class="service-icon">{{ service.icon }}</div>
        <h3>{{ service.title }}</h3>
        <p>{{ service.description }}</p>
        <ul>
          <li *ngFor="let item of service.items">✓ {{ item }}</li>
        </ul>
        <!-- <div class="service-price">Starting from <strong>{{ service.price }}</strong></div> -->
      </div>
    </div>
  </div>
</section>
