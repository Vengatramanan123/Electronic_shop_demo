<section class="section" id="contact">
  <div class="container">
    <span class="badge">Get In Touch</span>
    <h2 class="section-title">Contact Us</h2>
    <p class="section-subtitle">Drop us a message or visit our shop. We'll get back to you within a few hours.</p>

    <div class="contact-grid">
      <div class="contact-info">
        <div class="info-card" *ngFor="let info of contactInfo">
          <div class="info-icon">{{ info.icon }}</div>
          <div>
            <h4>{{ info.label }}</h4>
            <p [innerHTML]="info.value"></p>
          </div>
        </div>

        <div class="map-placeholder">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d248849.886539092!2d80.07193!3d13.0478!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a5265ea4f7d3361%3A0x6e61a70b6863d433!2sChennai%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1699000000000"
            width="100%"
            height="200"
            style="border:0; border-radius: 12px;"
            allowfullscreen=""
            loading="lazy">
          </iframe>
        </div>
      </div>

      <form class="contact-form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
        <div *ngIf="submitted" class="success-msg">
          ✅ Thank you! We'll get back to you shortly.
        </div>

        <div class="form-group">
          <label>Your Name</label>
          <input type="text" name="name" [(ngModel)]="form.name" placeholder="Eg. Ravi Kumar" required />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" name="phone" [(ngModel)]="form.phone" placeholder="+91 98765 43210" required />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" [(ngModel)]="form.email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label>Device / Issue</label>
          <select name="device" [(ngModel)]="form.device">
            <option value="">Select a device type</option>
            <option>Smartphone</option>
            <option>Laptop</option>
            <option>Television</option>
            <option>Gaming Console</option>
            <option>Printer</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Describe the Problem</label>
          <textarea name="message" [(ngModel)]="form.message" rows="4" placeholder="Tell us what happened with your device..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; justify-content: center;">
          Send Message →
        </button>
      </form>
    </div>
  </div>
</section>
