<section class="section" id="contact">
  <div class="container">
    <span class="badge">Get In Touch</span>
    <h2 class="section-title">Contact VM WashCare</h2>
    <p class="section-subtitle">
      Call us for washing machine service. We provide doorstep service in Chennai.
    </p>

    <div class="contact-grid">

      <!-- Left Side - Map -->
      <div class="contact-map">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d248849.886539092!2d80.07193!3d13.0478!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a5265ea4f7d3361%3A0x6e61a70b6863d433!2sAmbattur%2C%20Chennai%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1699000000000"
          width="100%"
          height="300"
          style="border:0; border-radius:12px;"
          allowfullscreen=""
          loading="lazy">
        </iframe>
      </div>

      <!-- Right Side - Contact Details -->
      <div class="contact-details">
        <div class="info-card" *ngFor="let info of contactInfo">
          <div class="info-icon">{{ info.icon }}</div>
          <div>
            <h4>{{ info.label }}</h4>
            <p [innerHTML]="info.value"></p>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
